name: Sync cms-preview with master

# Every push to master triggers Vercel to deploy the production version of
# the portfolio. The preview deployment lives on the `cms-preview` branch
# (which has different Vercel env vars pointing at the CMS's /draft endpoint)
# and needs the same code as master to stay useful. This workflow
# fast-forwards cms-preview to match master on every push.
#
# Fails loudly (non-ff) if cms-preview has commits master doesn't — that
# shouldn't happen in normal use (no one edits cms-preview directly).

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out cms-preview
        uses: actions/checkout@v4
        with:
          ref: cms-preview
          fetch-depth: 0

      - name: Fast-forward cms-preview to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git merge --ff-only origin/master
          git push origin cms-preview
